description: The United States Fire Administration (USFA) is a government agency under the Federal Emergency Management Agency
  (FEMA) that is responsible for providing leadership and support to fire departments across the country. The USFA works to
  improve fire prevention and safety by disseminating training and education programs, conducting research on fire-related
  issues, and developing national fire prevention initiatives. USFA manages the National Fire Incident Reporting System (NFIRS)
  and the National Fire Academy (NFA). Fire incident data is accessible through the OpenFEMA API platform at www.fema.gov/api/open.
