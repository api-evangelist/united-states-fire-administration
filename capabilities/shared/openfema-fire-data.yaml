naftiko: "1.0.0-alpha1"

info:
  label: "OpenFEMA Fire Data API"
  description: >-
    Free, read-only access to FEMA and USFA datasets including disaster
    declarations, NFIRS fire incident data, and other emergency management
    data via the OpenFEMA API platform.
  tags:
    - Fire Safety
    - Emergency Management
    - Disaster Declarations
    - FEMA
    - Federal Government
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys: {}

capability:
  consumes:
    - type: http
      namespace: openfema
      baseUri: https://www.fema.gov/api/open
      description: "OpenFEMA REST API - no API key required"
      resources:
        - name: datasets
          path: /v1/OpenFemaDataSets
          description: "Metadata about available OpenFEMA datasets"
          operations:
            - name: list-datasets
              method: GET
              description: "List Available Data Sets"
              inputParameters:
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Fields to return"
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Max records to return"
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: "Records to skip"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dataset-fields
          path: /v1/OpenFemaDataSetFields
          description: "Field-level metadata for OpenFEMA datasets"
          operations:
            - name: list-dataset-fields
              method: GET
              description: "List Data Set Fields"
              inputParameters:
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "Filter by dataset name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: disaster-declarations
          path: /v1/FemaWebDisasterDeclarations
          description: "FEMA presidential disaster declarations"
          operations:
            - name: get-disaster-declarations
              method: GET
              description: "Get Disaster Declarations"
              inputParameters:
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter (e.g. incidentType eq 'Fire')"
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Max records to return"
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: "Records to skip"
                - name: $orderby
                  in: query
                  type: string
                  required: false
                  description: "Sort field and direction"
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated fields to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: disaster-summaries
          path: /v2/DisasterDeclarationsSummaries
          description: "Summarized FEMA disaster declarations"
          operations:
            - name: get-disaster-summaries
              method: GET
              description: "Get Disaster Declarations Summaries"
              inputParameters:
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Max records"
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: "Records to skip"
                - name: $orderby
                  in: query
                  type: string
                  required: false
                  description: "Sort field"
                - name: $count
                  in: query
                  type: boolean
                  required: false
                  description: "Include total count"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: usfa-rest
      resources:
        - path: /v1/datasets
          name: datasets
          description: "List available OpenFEMA datasets"
          operations:
            - method: GET
              name: list-datasets
              description: "Get available OpenFEMA datasets with metadata"
              call: "openfema.list-datasets"
              with: {}
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/fire-disasters
          name: fire-disasters
          description: "Get fire-type disaster declarations"
          operations:
            - method: GET
              name: get-fire-disasters
              description: "Get fire disaster declarations"
              call: "openfema.get-disaster-declarations"
              with:
                $filter: "incidentType eq 'Fire'"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: usfa-mcp
      transport: http
      tools:
        - name: list-openfema-datasets
          description: "List all available OpenFEMA datasets with metadata"
          hints:
            readOnly: true
            idempotent: true
          call: "openfema.list-datasets"
          with: {}
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-fire-disaster-declarations
          description: "Get FEMA fire disaster declarations by state and date range"
          hints:
            readOnly: true
            idempotent: true
          call: "openfema.get-disaster-declarations"
          with:
            $filter: "tools.filter"
            $top: "tools.top"
            $orderby: "tools.orderby"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-disaster-summaries
          description: "Get summarized FEMA disaster declarations with program authorizations"
          hints:
            readOnly: true
            idempotent: true
          call: "openfema.get-disaster-summaries"
          with:
            $filter: "tools.filter"
            $top: "tools.top"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-dataset-fields
          description: "Get field-level metadata for an OpenFEMA dataset"
          hints:
            readOnly: true
            idempotent: true
          call: "openfema.list-dataset-fields"
          with:
            $filter: "tools.dataset_name"
          outputParameters:
            - type: object
              mapping: "$."
