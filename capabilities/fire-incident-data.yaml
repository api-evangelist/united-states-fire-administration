naftiko: 1.0.0-alpha2
info:
  label: USFA Fire Incident Data and Analysis
  description: Capability for fire incident data research and emergency management analysis using the OpenFEMA API. Combines
    fire disaster declarations, FEMA dataset discovery, and summary-level emergency data to support fire safety researchers,
    emergency managers, and public safety analysts.
  tags:
  - Fire Safety
  - Emergency Management
  - Disaster Analysis
  - USFA
  - FEMA
  - Federal Government
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys: {}
capability:
  consumes:
  - type: http
    namespace: openfema
    baseUri: https://www.fema.gov/api/open
    description: OpenFEMA REST API - no API key required
    resources:
    - name: datasets
      path: /v1/OpenFemaDataSets
      description: Metadata about available OpenFEMA datasets
      operations:
      - name: list-datasets
        method: GET
        description: List Available Data Sets
        inputParameters:
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        - name: $select
          in: query
          type: string
          required: false
          description: Fields to return
        - name: $top
          in: query
          type: integer
          required: false
          description: Max records to return
        - name: $skip
          in: query
          type: integer
          required: false
          description: Records to skip
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dataset-fields
      path: /v1/OpenFemaDataSetFields
      description: Field-level metadata for OpenFEMA datasets
      operations:
      - name: list-dataset-fields
        method: GET
        description: List Data Set Fields
        inputParameters:
        - name: $filter
          in: query
          type: string
          required: false
          description: Filter by dataset name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: disaster-declarations
      path: /v1/FemaWebDisasterDeclarations
      description: FEMA presidential disaster declarations
      operations:
      - name: get-disaster-declarations
        method: GET
        description: Get Disaster Declarations
        inputParameters:
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter (e.g. incidentType eq 'Fire')
        - name: $top
          in: query
          type: integer
          required: false
          description: Max records to return
        - name: $skip
          in: query
          type: integer
          required: false
          description: Records to skip
        - name: $orderby
          in: query
          type: string
          required: false
          description: Sort field and direction
        - name: $select
          in: query
          type: string
          required: false
          description: Comma-separated fields to return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: disaster-summaries
      path: /v2/DisasterDeclarationsSummaries
      description: Summarized FEMA disaster declarations
      operations:
      - name: get-disaster-summaries
        method: GET
        description: Get Disaster Declarations Summaries
        inputParameters:
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        - name: $top
          in: query
          type: integer
          required: false
          description: Max records
        - name: $skip
          in: query
          type: integer
          required: false
          description: Records to skip
        - name: $orderby
          in: query
          type: string
          required: false
          description: Sort field
        - name: $count
          in: query
          type: boolean
          required: false
          description: Include total count
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: usfa-fire-data-api
    description: Unified REST API for USFA fire incident data and emergency management analysis.
    resources:
    - path: /v1/datasets
      name: datasets
      description: Discover available OpenFEMA datasets and their metadata
      operations:
      - method: GET
        name: list-datasets
        description: List all available OpenFEMA datasets
        call: openfema.list-datasets
        with:
          $top: rest.top
          $select: rest.select
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasets/fields
      name: dataset-fields
      description: Get field-level data dictionary for a dataset
      operations:
      - method: GET
        name: list-dataset-fields
        description: Get field descriptions for a specific dataset
        call: openfema.list-dataset-fields
        with:
          $filter: rest.datasetName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fire-disasters
      name: fire-disasters
      description: Fire-type FEMA disaster declarations
      operations:
      - method: GET
        name: list-fire-disasters
        description: List FEMA fire disaster declarations with optional filters
        call: openfema.get-disaster-declarations
        with:
          $filter: rest.filter
          $top: rest.top
          $skip: rest.skip
          $orderby: rest.orderby
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/disasters/summaries
      name: disaster-summaries
      description: Summarized disaster declarations with program details
      operations:
      - method: GET
        name: list-disaster-summaries
        description: Get disaster declarations with authorized assistance programs
        call: openfema.get-disaster-summaries
        with:
          $filter: rest.filter
          $top: rest.top
          $skip: rest.skip
          $orderby: rest.orderby
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: usfa-fire-data-mcp
    transport: http
    description: MCP server for AI-assisted fire safety research and emergency management analysis.
    tools:
    - name: list-openfema-datasets
      description: List all available datasets on the OpenFEMA platform with descriptions and last update times
      hints:
        readOnly: true
        idempotent: true
      call: openfema.list-datasets
      with:
        $top: tools.top
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataset-fields
      description: Get data dictionary and field descriptions for a specific OpenFEMA dataset
      hints:
        readOnly: true
        idempotent: true
      call: openfema.list-dataset-fields
      with:
        $filter: tools.dataset_name
      outputParameters:
      - type: object
        mapping: $.
    - name: get-fire-disaster-declarations
      description: Retrieve FEMA fire disaster declarations filtered by state, date, or other criteria
      hints:
        readOnly: true
        idempotent: true
      call: openfema.get-disaster-declarations
      with:
        $filter: tools.filter
        $top: tools.top
        $orderby: tools.orderby
      outputParameters:
      - type: object
        mapping: $.
    - name: get-disaster-program-summaries
      description: Get summarized disaster declarations showing which FEMA assistance programs were authorized
      hints:
        readOnly: true
        idempotent: true
      call: openfema.get-disaster-summaries
      with:
        $filter: tools.filter
        $top: tools.top
        $count: tools.include_count
      outputParameters:
      - type: object
        mapping: $.
