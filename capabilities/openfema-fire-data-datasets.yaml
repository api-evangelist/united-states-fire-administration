naftiko: 1.0.0-alpha2
info:
  label: OpenFEMA Fire Data API — Datasets
  description: 'OpenFEMA Fire Data API — Datasets. 2 operations. Lead operation: List Data Set Fields. Self-contained Naftiko
    capability covering one United States Fire Administration business surface.'
  tags:
  - United States Fire Administration
  - Datasets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITED_STATES_FIRE_ADMINISTRATION_API_KEY: UNITED_STATES_FIRE_ADMINISTRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: openfema-fire-data-datasets
    baseUri: https://www.fema.gov/api/open
    description: OpenFEMA Fire Data API — Datasets business capability. Self-contained, no shared references.
    resources:
    - name: v1-OpenFemaDataSetFields
      path: /v1/OpenFemaDataSetFields
      operations:
      - name: listdatasetfields
        method: GET
        description: List Data Set Fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $filter
          in: query
          type: string
          description: Filter by dataset name
        - name: $top
          in: query
          type: integer
        - name: $skip
          in: query
          type: integer
        - name: $format
          in: query
          type: string
    - name: v1-OpenFemaDataSets
      path: /v1/OpenFemaDataSets
      operations:
      - name: listdatasets
        method: GET
        description: List Available Data Sets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $filter
          in: query
          type: string
          description: OData filter expression (e.g. name eq 'FemaWebDisasterDeclarations')
        - name: $select
          in: query
          type: string
          description: Comma-separated list of fields to return
        - name: $top
          in: query
          type: integer
          description: Maximum number of records to return (default 1000, max 10000)
        - name: $skip
          in: query
          type: integer
          description: Number of records to skip for pagination
        - name: $format
          in: query
          type: string
          description: Response format
  exposes:
  - type: rest
    namespace: openfema-fire-data-datasets-rest
    port: 8080
    description: REST adapter for OpenFEMA Fire Data API — Datasets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/openfemadatasetfields
      name: v1-openfemadatasetfields
      description: REST surface for v1-OpenFemaDataSetFields.
      operations:
      - method: GET
        name: listdatasetfields
        description: List Data Set Fields
        call: openfema-fire-data-datasets.listdatasetfields
        with:
          $filter: rest.$filter
          $top: rest.$top
          $skip: rest.$skip
          $format: rest.$format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/openfemadatasets
      name: v1-openfemadatasets
      description: REST surface for v1-OpenFemaDataSets.
      operations:
      - method: GET
        name: listdatasets
        description: List Available Data Sets
        call: openfema-fire-data-datasets.listdatasets
        with:
          $filter: rest.$filter
          $select: rest.$select
          $top: rest.$top
          $skip: rest.$skip
          $format: rest.$format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openfema-fire-data-datasets-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenFEMA Fire Data API — Datasets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-data-set-fields
      description: List Data Set Fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openfema-fire-data-datasets.listdatasetfields
      with:
        $filter: tools.$filter
        $top: tools.$top
        $skip: tools.$skip
        $format: tools.$format
      outputParameters:
      - type: object
        mapping: $.
    - name: list-available-data-sets
      description: List Available Data Sets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openfema-fire-data-datasets.listdatasets
      with:
        $filter: tools.$filter
        $select: tools.$select
        $top: tools.$top
        $skip: tools.$skip
        $format: tools.$format
      outputParameters:
      - type: object
        mapping: $.
